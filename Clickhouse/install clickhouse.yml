---
- name: Install Clickhouse
  hosts: all
  become: yes

  tasks:
    - name: Disable swap
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove swap entry from fstab
      mount:
        name: none
        fstype: swap
        state: absent

    - name: Reboot systems
      ansible.builtin.reboot:

    - block: ## Debian Family ##
        - name: Install Clickhouse dependency on Debian
          ansible.builtin.apt:
            pkg:
              - apt-transport-https
              - ca-certificates
              - curl
              - gnupg
            state: present

        - name: Download GPG Key
          ansible.builtin.shell: curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' | sudo gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg

        - name: Add Repository
          ansible.builtin.shell: ARCH=$(dpkg --print-architecture) && echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg arch=${ARCH}] https://packages.clickhouse.com/deb stable main" | sudo tee /etc/apt/sources.list.d/clickhouse.list

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache=yes

        - name: Install Clickhouse and update cash apt
          ansible.builtin.apt:
            pkg:
              - clickhouse-server
              - clickhouse-client
            state: present

        - name: Run service Clickhouse and Enable on Debian
          ansible.builtin.service:
            name=clickhouse-server
            state=started
            enabled=yes

      when: ansible_os_family == "Debian"


    - block: ## RedHat Family ##
        - name: Install Clickhouse dependency on RedHat
          ansible.builtin.yum:
            name=yum-utils
            state=present

        - name: Install Clickhouse repository on RedHat
          ansible.builtin.shell: yum-config-manager --add-repo https://packages.clickhouse.com/rpm/clickhouse.repo

        - name: Install Clickhouse dependency on RedHat
          ansible.builtin.yum:
            name: "{{ packages }}"
          vars:
            packages:
              - clickhouse-server
              - clickhouse-client
            state: present

        - name: Run service Clickhouse and Enable on RedHat
          ansible.builtin.service:
            name=clickhouse-server
            state=started
            enabled=yes

      when: ansible_os_family == "RedHat"